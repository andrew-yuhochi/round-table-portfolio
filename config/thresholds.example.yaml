# Portfolio invariant thresholds — example / publish-safe copy
#
# Copy to thresholds.yaml and adjust for your mandate design.
# max_position_weight: hard per-ticker weight ceiling (e.g. 0.20 = 20%).
max_position_weight: 0.20
dissent_std_dev_threshold: 0.08
run_window_hours: 5.0

# Component 21 — recalibrated dissent metric (DEF-004, TASK-M3-001)
contested_week_threshold: 0.50
action_direction_map:
  add:    1.0
  hold:   0.0
  reduce: -0.5
  exit:   -1.0
n_outliers: 2
divergence_tiebreak: alpha_asc

# Component 23 — counterargument assembly (TASK-M3-002)
# Max opposing rationale quotes per outlier's counterargument block.
counterargument_max_rationales: 3
# Signed-score epsilon: tickers/personas within this tolerance are treated as agreed.
counterargument_agree_tolerance: 0.05

# Component 28 — whats_new_digest_builder (TASK-M4-001)
# Max resolved calls surfaced in the "what's new" digest per persona per run.
digest_max_items: 5
# Surface own resolved-below-SPY calls (misses) in the digest (true/false).
own_misses_in_digest: true
